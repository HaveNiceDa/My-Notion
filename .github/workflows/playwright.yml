name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Check required E2E secrets
        id: e2e_secrets
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
        run: |
          missing=()
          for name in NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY NEXT_PUBLIC_CONVEX_URL; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "mode=smoke" >> "$GITHUB_OUTPUT"
            echo "::notice::Running CI-safe public API smoke tests on ${{ github.event_name }}. Use workflow_dispatch for full browser E2E."
          elif [ ${#missing[@]} -gt 0 ]; then
            echo "mode=smoke" >> "$GITHUB_OUTPUT"
            echo "::notice::Required E2E secrets are missing: ${missing[*]}. Running public API smoke tests with CI-safe placeholder env."
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Web dev server
        run: |
          export NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-pk_test_ZHVtbXkuY2xlcmsuYWNjb3VudHMuZGV2JA}"
          export NEXT_PUBLIC_CONVEX_URL="${NEXT_PUBLIC_CONVEX_URL:-https://example.convex.cloud}"
          export LLM_API_KEY="${LLM_API_KEY:-dummy}"
          pnpm --filter @notion/web dev > /tmp/my-notion-web.log 2>&1 &
          echo $! > /tmp/my-notion-web.pid
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_JWT_ISSUER_DOMAIN: ${{ secrets.CLERK_JWT_ISSUER_DOMAIN }}
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
          NEXT_PUBLIC_CONVEX_SITE_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_SITE_URL }}
          CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_DEPLOYMENT }}
          EDGE_STORE_ACCESS_KEY: ${{ secrets.EDGE_STORE_ACCESS_KEY }}
          EDGE_STORE_SECRET_KEY: ${{ secrets.EDGE_STORE_SECRET_KEY }}
          NEXT_PUBLIC_QDRANT_URL: ${{ secrets.NEXT_PUBLIC_QDRANT_URL }}
          NEXT_PUBLIC_QDRANT_API_KEY: ${{ secrets.NEXT_PUBLIC_QDRANT_API_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Wait for dev server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Playwright tests
        run: |
          if [ "${{ steps.e2e_secrets.outputs.mode }}" = "full" ]; then
            pnpm exec playwright test --reporter=list
          else
            pnpm exec playwright test tests/web/api-routes.spec.ts --reporter=list
          fi
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Stop Web dev server
        if: ${{ always() }}
        run: |
          if [ -f /tmp/my-notion-web.pid ]; then
            kill "$(cat /tmp/my-notion-web.pid)" 2>/dev/null || true
          fi

      - name: Upload Web server log
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: web-server-log
          path: /tmp/my-notion-web.log
          if-no-files-found: ignore
          retention-days: 7
