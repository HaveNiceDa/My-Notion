name: AI Smoke

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ai-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ai-smoke:
    name: AI Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run AI smoke
        run: pnpm ci:ai-smoke
        env:
          AI_SMOKE_SKIP_E2E: "1"

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: ai-smoke-test-results
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 30
